<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mwethya Mutisya | Resume</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #0a2540);
      color: white;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }

    .header h1 {
      margin: 0;
      font-size: 2.5rem;
      color: #63D2FF;
    }

    .header p {
      margin-top: 0.5rem;
      color: #94a3b8;
    }

    /* Buttons */
    .actions {
      text-align: center;
      margin: 1.5rem 0;
    }

    .btn {
      text-decoration: none;
      background: linear-gradient(135deg, #4FD1C5, #63D2FF);
      color: #0f172a;
      padding: 0.7rem 1.4rem;
      border-radius: 25px;
      font-weight: bold;
      margin: 0 0.5rem;
      transition: 0.3s ease;
      display: inline-block;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(99, 210, 255, 0.3);
    }

    /* Resume Container */
    .resume-container {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto 2rem;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      background: white;
    }

    /* Subtle glow effect */
    .resume-container:hover {
      box-shadow: 0 0 40px rgba(99, 210, 255, 0.3);
    }

  </style>
</head>

<body>

  <div class="header">
    <h1>Mwethya Mutisya</h1>
    <p>Mathematics • Data Analysis • Machine Learning</p>
  </div>

  <div class="actions">
    <a href="MY RESUME ().pdf" class="btn" download>⬇ Download CV</a>
    <a href="MY RESUME ().pdf" class="btn" target="_blank">🔍 Open Fullscreen</a>
  </div>

  <div class="resume-container">
    <iframe src="MY RESUME ().pdf"></iframe>
  </div>

</body>
</html>
